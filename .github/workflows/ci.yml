name: CI Test for Cropped Example

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # Specify the Python version

    # Clone and install ActivitySim from estimation_enhancements branch
    # This is a temporary workaround until the PR is merged into the main branch
    - name: Clone and install ActivitySim
      run: |
        git clone --branch estimation_enhancements https://github.com/RSGInc/activitysim.git
        cd activitysim
        git checkout SimOR_pnr
        python -m pip install --upgrade pip
        pip install -e .  # Install ActivitySim in editable mode
        cd ..

    # Install other dependencies
    - name: Install additional dependencies
      run: |
        pip install -r requirements.txt || true  # Install other dependencies if a requirements.txt exists

    # Run the test
    - name: Run cropped example test
      run: python test/test_cropped_dataset.py