name: CI Test for Cropped Example

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # Specify the Python version

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install activitysim  # Install the latest version of activitysim
        pip install -r requirements.txt || true  # Install other dependencies if a requirements.txt exists

    # Run the test
    - name: Run cropped example test
      run: python test/test_cropped_dataset.py