data_dir: ..\skimming_and_assignment\maz_maz_stop_skims\Visum_Outputs_LCOG
# output_dir: null  # null means overwrite input files
output_dir: model_data\lcog\data_full
households_file: synthetic_households.csv
persons_file: synthetic_persons.csv
land_use_file: MAZ_tbl_ea.csv

maz_shp_file: ..\skimming_and_assignment\maz_maz_stop_skims\Visum_Outputs_LCOG\MAZ_poi_surface_ea.shp

maz_stop_walk_file: ..\skimming_and_assignment\maz_maz_stop_skims\output\lcog_2way\maz_stop_walk.csv
maz_maz_walk_file:  ..\skimming_and_assignment\maz_maz_stop_skims\output\lcog_2way\maz_maz_walk.csv

# Variable-fare transit skims
# Non-TOD segmented transit fare skim file processed into fares.omx segmented by TOD with matrices fare__[time_of_day]
fare_skim_input_file: 
times_of_day: ["EA", "AM", "MD", "PM", "EV"]

# Flat-fare transit skims
# Add value to create flat-rate fares.omx, leave empty if skim does not need to be created
flat_fare_rate: 1.75 # 1.60 skats, 1.75 lcog

# Land use settings
nodes_file: ..\skimming_and_assignment\maz_maz_stop_skims\Visum_Outputs_LCOG\AllStreets_Network_node.shp
links_file: ..\skimming_and_assignment\maz_maz_stop_skims\Visum_Outputs_LCOG\AllStreets_Network_link.shp
density_radius: 0.50 # walk radius (miles) for density calculations

# If expected parking costs were calculated, add expected parking costs
# Leave empty if exp costs do not need to be added
exp_parking_costs_file: ..\skimming_and_assignment\maz_maz_stop_skims\Visum_Outputs_LCOG\expected_parking_data.csv

# Intersection counts
count_intersections: True 
# If count_intersections is False, provide col name with intersection counts
icnt_col: 

# Network filter for intersection counts
# Specify col name and values to filter on
link_filter_col: TYPENO

