
inherit_settings: True

# assume enough RAM to not chunk
chunk_training_mode: disabled

# input tables
# input tables
input_table_list:
  - tablename: households
    filename: override_households.csv
    index_col: household_id
  - tablename: persons
    filename: override_persons.csv
    index_col: person_id
  - tablename: land_use
    filename: land_use.csv
    index_col: zone_id
    rename_columns:
      MAZ: zone_id
    drop_columns:
      - i1
      - i2
      - i3
      - i4
      - i5
      - i6
      - i7
      - i8
      - i9
      - hs
      - hs_sf
      - hs_mf
      - hs_mh
      - hh_sf
      - hh_mf
      - hh_mh
      - zip09
      - luz_id

write_raw_tables: False

fail_fast: True

use_shadow_pricing: False

multiprocess: False
num_processes: 10

# turn writing of sample_tables on and off for all models
# (if True, tables will be written if DEST_CHOICE_SAMPLE_TABLE_NAME is specified in individual model settings)
want_dest_choice_sample_tables: False

# number of households to simulate
households_sample_size: 0

resume_after:

models:
  ### mp_init_proto_pop (single process)
  - transit_lot_connectivity
  - initialize_proto_population # Separate step so proto tables can be split for multiprocess.
  ### mp_disaggregate_accessibility
  - compute_disaggregate_accessibility
  ### mp_initialize_hhs (single process)
  - initialize_landuse
  - initialize_households
  ### mp_accessibility
  - compute_accessibility
  ### mp_households
  - license_holding_status
  - bike_comfort
  - av_ownership
  - auto_ownership_simulate
  - work_from_home
  - external_worker_identification
  - external_workplace_location
  - school_location
  - workplace_location
  - vehicle_type_choice
  - adjust_auto_operating_cost
  - transit_pass_subsidy
  - transit_pass_ownership
  - free_parking
  - telecommute_frequency
  - cdap_simulate
  - mandatory_tour_frequency
  - mandatory_tour_scheduling
  - school_escorting
  - joint_tour_frequency_composition
  - external_joint_tour_identification
  - joint_tour_participation
  - joint_tour_destination
  - external_joint_tour_destination
  - joint_tour_scheduling
  - non_mandatory_tour_frequency
  - external_non_mandatory_identification
  - non_mandatory_tour_destination
  - external_non_mandatory_destination
  - non_mandatory_tour_scheduling
  - vehicle_allocation
  - park_and_ride_lot_choice
  - tour_mode_choice_simulate
  - atwork_subtour_frequency
  - atwork_subtour_destination
  - atwork_subtour_scheduling
  - atwork_subtour_mode_choice
  - stop_frequency
  - trip_purpose
  - trip_destination
  - trip_purpose_and_destination
  - trip_scheduling
  - trip_mode_choice
  - parking_location
  ### mp_summarize (single process)
  - write_data_dictionary
  - track_skim_usage
  - write_trip_matrices
  - write_tables

multiprocess_steps:
  - name: mp_init_proto_pop
    begin: transit_lot_connectivity
  - name: mp_disaggregate_accessibility
    num_processes: 10
    begin: compute_disaggregate_accessibility
    slice:
      tables:
        - proto_households
        - proto_persons
        - proto_tours
  - name: mp_initialize_hhs
    begin: initialize_landuse
  - name: mp_accessibility
    begin: compute_accessibility
    num_processes: 10
    slice:
      tables:
        - accessibility
      exclude: True  # this is needed so landuse (i.e. destinations) doesn't get split
  - name: mp_households
    begin: license_holding_status
    slice:
      tables:
        - households
        - persons
  - name: mp_summarize
    begin: write_data_dictionary