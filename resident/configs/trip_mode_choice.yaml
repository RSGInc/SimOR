SPEC: trip_mode_choice.csv
COEFFICIENTS: trip_mode_choice_coefficients.csv
COEFFICIENT_TEMPLATE: trip_mode_choice_coefficients_template.csv

LOGIT_TYPE: NL

NESTS:
  name: root
  coefficient: coef_nest_root
  alternatives:
      - name: AUTO
        coefficient: coef_nest_AUTO
        alternatives:
            - DRIVEALONE
            - SHARED2
            - SHARED3
      - name: NONMOTORIZED
        coefficient: coef_nest_NONMOTORIZED
        alternatives:
          - WALK
          - BIKE
      - name: MICROMOBILITY
        coefficient: coef_nest_MICROMOBILITY
        alternatives:
          - EBIKE
          - ESCOOTER
      - name: TRANSIT
        coefficient:  coef_nest_TRANSIT
        alternatives:
          - WALK_TRANSIT
          - PNR_TRANSIT
          - KNR_TRANSIT
          - BIKE_TRANSIT
      - name: RIDEHAIL
        coefficient: coef_nest_RIDEHAIL
        alternatives:
          - TAXI
          - TNC_SINGLE
          - TNC_SHARED
      - name: SCHOOL_BUS
        coefficient: coef_nest_SCHOOL_BUS
        alternatives:
          - SCH_BUS

CONSTANTS:
  orig_col_name: origin
  dest_col_name: destination


# so far, we can use the same spec as for non-joint tours
preprocessor:
  SPEC: trip_mode_choice_annotate_trips_preprocessor
  DF: df
  TABLES:
    - land_use
    - tours
    - vehicles
    - households
    - persons

# to reduce memory needs filter chooser table to these fields
TOURS_MERGED_CHOOSER_COLUMNS:
  - hhsize
  - age
  - num_adults
  - auto_ownership
  - number_of_participants
  - tour_category
  - parent_tour_id
  - tour_mode
  - duration
  - tour_type
  - free_parking_at_work
  - income_segment
  - income
  - SEX
  - time_factor_work
  - time_factor_nonwork
  - ptype
  - ebike_owner
  - start
  - end
  - transit_pass_subsidy
  - transit_pass_ownership
  - telecommute_frequency

MODE_CHOICE_LOGSUM_COLUMN_NAME: mode_choice_logsum

CHOOSER_COLS_TO_KEEP:
  - vot_da
  - vot_s2
  - vot_s3
  - ebike_owner
  - parkingCost
  - auto_op_cost
  - autoCPMFactor
  - autoParkingCostFactor
  - autoTermTimeFactor
  - costFactorS2
  - costFactorS3
  - transitSubsidyPassDiscount
  - origTaxiWaitTime
  - origSingleTNCWaitTime
  - destSingleTNCWaitTime
  - origSharedTNCWaitTime
  - da_dist_skims
  - s2_time_skims
  - s2_dist_skims
  - s2_cost_skims
  - s3_time_skims
  - s3_dist_skims
  - s3_cost_skims
  - ebike_time
  - escooter_time